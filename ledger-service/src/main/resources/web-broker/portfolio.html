<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#0d1117">
<title>Portfolio ┬Ę minibank</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#21262d; --text:#e6edf3; --dim:#8b949e;
          --green:#3fb950; --red:#f85149; --amber:#d29922; --accent:#58a6ff; --violet:#bc8cff; }

  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.5 system-ui,'Segoe UI',sans-serif;
         -webkit-text-size-adjust:100%; }
  main { max-width:1100px; margin:0 auto; padding:14px; padding-bottom:46px; }
  .phone { max-width:540px; margin:0 auto; }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px; overflow-x:auto; }
  .card h2 { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; margin:0 0 10px; }

  /* ---------- the notice ┬Ę deliberately the loudest thing on the page ---------- */
  .sim { display:flex; gap:10px; align-items:flex-start; border:1px solid var(--amber);
         border-radius:12px; padding:11px 13px; margin-bottom:14px;
         background:rgba(210,153,34,.10); }
  .sim-ic { font-size:15px; line-height:1.2; }
  .sim b { display:block; font:700 11px system-ui; letter-spacing:.08em; text-transform:uppercase;
           color:var(--amber); margin-bottom:2px; }
  .sim p { margin:0; font-size:12px; color:var(--dim); }
  .sim.live { border-color:var(--red); background:rgba(248,81,73,.10); }
  .sim.live b { color:var(--red); }

  /* ---------- header ---------- */
  .head { background:radial-gradient(130% 150% at 0% 0%, rgba(188,140,255,.13), transparent 45%),
          radial-gradient(100% 130% at 100% 0%, rgba(88,166,255,.08), transparent 40%), var(--panel);
          border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:14px; }
  .head h1 { font:600 13px system-ui; letter-spacing:.05em; text-transform:uppercase;
             color:var(--dim); margin:0 0 2px; }
  .pv-label { font-size:11px; color:var(--dim); }
  .pv { font-size:40px; font-weight:750; letter-spacing:-.5px; margin:2px 0 12px;
        font-variant-numeric:tabular-nums; line-height:1.1; overflow-wrap:break-word; }
  .pnl-rows { display:flex; flex-direction:column; gap:7px; border-top:1px solid var(--line); padding-top:11px; }
  .pnl-row { display:flex; justify-content:space-between; align-items:baseline; gap:12px; }
  .pnl-row > span { font:700 10.5px system-ui; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  .pnl-val { font-family:'Cascadia Code', Consolas, monospace; font-size:13px; font-weight:650;
             font-variant-numeric:tabular-nums; text-align:right; }
  .pnl-val .pct { font-size:11.5px; opacity:.85; margin-left:6px; }

  /* ---------- holdings ---------- */
  .hrow { border-top:1px solid var(--line); padding:11px 2px; cursor:pointer;
          transition:background .15s; position:relative; }
  .hrow:first-child { border-top:none; }
  .hrow:hover { background:rgba(255,255,255,.035); }
  .hrow.open { background:rgba(255,255,255,.02); }
  .hgrid { display:grid; grid-template-columns:minmax(0,1.25fr) minmax(0,1fr) minmax(0,1fr);
           gap:8px; align-items:start; }
  .hgrid.noday { grid-template-columns:minmax(0,1.4fr) minmax(0,1fr); }
  .thead { display:grid; grid-template-columns:minmax(0,1.25fr) minmax(0,1fr) minmax(0,1fr);
           gap:8px; padding:0 2px 8px; }
  .thead.noday { grid-template-columns:minmax(0,1.4fr) minmax(0,1fr); }
  .thead span { font:700 10px system-ui; letter-spacing:.07em; text-transform:uppercase; color:var(--dim); }
  .thead span:not(:first-child), .hgrid > div:not(:first-child) { text-align:right; }

  .tkr { font:650 14px system-ui; }
  .exch { font-family:'Cascadia Code', Consolas, monospace; font-size:9.5px; color:var(--dim);
          margin-left:5px; letter-spacing:.02em; }
  .cname { font-size:11px; color:var(--dim); margin-top:1px; overflow-wrap:break-word; }
  .mv { font-family:'Cascadia Code', Consolas, monospace; font-size:13.5px; font-weight:650;
        font-variant-numeric:tabular-nums; }
  .sub { font-family:'Cascadia Code', Consolas, monospace; font-size:10.5px; color:var(--dim);
         margin-top:1px; font-variant-numeric:tabular-nums; overflow-wrap:anywhere; }
  .day { font-family:'Cascadia Code', Consolas, monospace; font-size:13px; font-weight:650;
         font-variant-numeric:tabular-nums; }

  .amount-pos { color:var(--green); } .amount-neg { color:var(--red); }
  .na { color:var(--dim); font-weight:400; font-size:11.5px; letter-spacing:.02em; cursor:help;
        border-bottom:1px dotted var(--line); }
  .flag { display:inline-block; margin-left:6px; padding:1px 6px; border-radius:999px;
          border:1px solid var(--amber); color:var(--amber); font:600 9px system-ui;
          text-transform:uppercase; letter-spacing:.05em; vertical-align:1px; }

  /* ---------- expansion ---------- */
  .hx { margin-top:11px; border-top:1px solid var(--line); padding-top:11px; cursor:default; }
  .dl { display:grid; grid-template-columns:1fr 1fr; gap:7px 12px; margin-bottom:11px; }
  .dl > div { display:flex; justify-content:space-between; align-items:baseline; gap:8px;
              border-top:1px solid rgba(255,255,255,.04); padding-top:5px; }
  .dl span { font-size:10.5px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; }
  .dl b { font-family:'Cascadia Code', Consolas, monospace; font-size:12px; font-weight:650;
          font-variant-numeric:tabular-nums; text-align:right; }
  .basis { font-size:10.5px; color:var(--dim); margin:-4px 0 10px; }

  .amt-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
  .amt-row label { font:700 10.5px system-ui; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); }
  input { background:var(--bg); border:1px solid var(--line); color:var(--text); padding:9px 10px;
          border-radius:8px; font:14px system-ui; }
  .amt-row input { flex:1; min-width:0; font-variant-numeric:tabular-nums;
                   font-family:'Cascadia Code', Consolas, monospace; font-size:13px; }
  .acts { display:flex; gap:8px; }
  .side-btn { flex:1; height:40px; border:none; border-radius:8px; color:#fff;
              font:700 13px system-ui; cursor:pointer; transition:filter .15s, transform .1s; }
  .side-btn:hover { filter:brightness(1.12); }
  .side-btn:active { transform:scale(.985); }
  .side-btn:disabled { opacity:.45; cursor:not-allowed; filter:none; transform:none; }
  .buy  { background:linear-gradient(135deg, var(--accent), var(--violet)); }
  .sell { background:none; border:1px solid var(--line); color:var(--text); }
  .sell:hover { border-color:var(--violet); color:var(--violet); filter:none; }
  .msg { margin-top:9px; font-size:11.5px; min-height:16px; overflow-wrap:anywhere; }

  /* ---------- watchlist ---------- */
  .wrow { display:flex; justify-content:space-between; align-items:baseline; gap:12px;
          border-top:1px solid var(--line); padding:9px 2px; }
  .wrow:first-child { border-top:none; }
  .wpx { font-family:'Cascadia Code', Consolas, monospace; font-size:13px; font-weight:650;
         font-variant-numeric:tabular-nums; }

  .muted { color:var(--dim); font-size:11.5px; }
  .notes { margin-top:14px; }
  .notes p { margin:0 0 7px; color:var(--dim); font-size:11.5px; line-height:1.55; }
  .notes p:last-child { margin-bottom:0; }
  .sk { background:linear-gradient(90deg, #161c28 25%, #202939 37%, #161c28 63%); border-radius:6px;
        animation:sh 1.2s linear infinite; background-size:200% 100%; }
  @keyframes sh { to { background-position:-200% 0; } }
  .spacer { margin-bottom:14px; }

  @media (max-width:760px) {
    main { padding:12px; padding-bottom:46px; }
    .pv { font-size:34px; }
    .dl { grid-template-columns:1fr; }
    .tkr { font-size:13.5px; }
    .mv, .day { font-size:12.5px; }
  }
  @media (max-width:380px) {
    .pv { font-size:30px; }
    .hgrid { gap:6px; }
  }
  @media (prefers-reduced-motion: reduce) { .sk { animation:none; } }
</style>
</head>
<body>
<main class="phone">

  <div class="sim" id="sim">
    <div class="sim-ic">Ō¢▓</div>
    <div>
      <b id="sim-title">Simulated book</b>
      <p id="sim-text">These positions are a teaching simulation inside minibank. No real order ever
        reaches a market, and none of this is a record of real trading or investment advice.</p>
    </div>
  </div>

  <div class="head">
    <h1>Portfolio</h1>
    <div class="pv-label">Securities value <span class="muted">┬Ę cash excluded</span></div>
    <div class="pv" id="pv"><div class="sk" style="width:62%;height:34px"></div></div>
    <div class="pnl-rows" id="pnl"></div>
  </div>

  <div class="card spacer">
    <h2>Your holdings</h2>
    <div id="thead"></div>
    <div id="holdings"><div class="sk" style="width:100%;height:52px"></div></div>
  </div>

  <div class="card spacer">
    <h2>Watchlist</h2>
    <div id="watchlist"><div class="sk" style="width:100%;height:34px"></div></div>
  </div>

  <div class="notes" id="notes"></div>
</main>

<script>
'use strict';
// ===================================================================== pure
// Everything above the fetch line is arithmetic and formatting only: no DOM,
// no network, no globals read. Kept here so it can be lifted into a test.

/** Money and quantities cross the wire as STRINGS (or bare null) on purpose ┬Ę
 *  the eighth decimal of a bitcoin position does not survive a double. */
const num = s => (s === null || s === undefined || s === '') ? null : Number(s);

const isNum = v => v !== null && v !== undefined && Number.isFinite(v);

/** en-US grouping on a EUR amount ┬Ę the house convention, matched deliberately. */
function fmtEur(v, dp = 2) {
  const n = num(v);
  return !isNum(n) ? null
    : 'Ōé¼' + n.toLocaleString('en-US', { minimumFractionDigits: dp, maximumFractionDigits: dp });
}

/** U+2212 MINUS, never a hyphen ┬Ę the bank's rule. */
function fmtSignedEur(v) {
  const n = num(v);
  if (!isNum(n)) return null;
  const body = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  // exactly flat carries no sign ┬Ę '+Ōé¼0.00' claims a gain that did not happen
  return (n === 0 ? '' : n < 0 ? 'ŌłÆ' : '+') + 'Ōé¼' + body;
}

function fmtPct(v) {
  const n = num(v);
  if (!isNum(n)) return null;
  // Zero takes no sign. fmtSignedEur already guards this ("+Ōé¼0.00 claims a
  // gain that did not happen") and this was left without the same guard, so
  // a real loss whose percentage rounded to 0.00 rendered "+0.00%" in red
  // beside a negative amount ┬Ę a plus sign on a loss.
  const sign = n < 0 ? 'ŌłÆ' : n > 0 ? '+' : '';
  return sign + Math.abs(n).toFixed(2) + '%';
}

/** 'amount-pos' | 'amount-neg' | '' ┬Ę zero is neither a gain nor a loss. */
function signClass(v) {
  const n = num(v);
  if (!isNum(n) || n === 0) return '';
  return n > 0 ? 'amount-pos' : 'amount-neg';
}

/** Quantity is formatted from the STRING the server sent, never via Number,
 *  so satoshi precision cannot be rounded away in transit. */
function fmtQty(qtyStr) {
  if (qtyStr === null || qtyStr === undefined) return null;
  const s = String(qtyStr);
  return s.includes('.') ? s.replace(/0+$/, '').replace(/\.$/, '') : s;
}

const unitFor = kind => kind === 'crypto' ? '' : ' sh';

/** Largest position first; anything we could not price sinks to the bottom
 *  rather than sorting as if it were worth nothing. */
function sortHoldings(hs) {
  return hs.slice().sort((a, b) => {
    const av = num(a.value), bv = num(b.value);
    if (!isNum(av) && !isNum(bv)) return String(a.symbol).localeCompare(String(b.symbol));
    if (!isNum(av)) return 1;
    if (!isNum(bv)) return -1;
    return bv - av;
  });
}

/** Does ANY row have a day number? Drives whether the column exists at all ┬Ę
 *  a column of blanks is worse than no column. */
const anyDayData = hs => hs.some(h => isNum(num(h.dayChange)));

/** A mark the feed could not establish. /api/watchlist and /api/instruments
 *  fail SOFT TO ZERO (BrokerApi.mark), unlike /api/portfolio which correctly
 *  nulls ┬Ę so on those two a literal 0 means "no price", not "free". */
const markUnavailable = v => { const n = num(v); return !isNum(n) || n === 0; };

// A mark is "suspect" if it is not a live observation. 'cached' belongs here:
// PriceFeed reuses the last good price whenever the upstream is down, and
// refreshes the entry's timestamp each time it serves it, so a figure from
// hours ago is handed over looking exactly like one from this second ┬Ę while
// the header says "Priced at <now>". A stale price is still a real price, so
// the row keeps it and the total still stands; it just stops pretending to
// be current.
const priceSuspect = src => src === 'fallback' || src === 'unavailable' || src === 'cached';

// ===================================================================== view

const NA = (why) => `<span class="na" title="${esc(why)}">not available</span>`;

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/** Identity, the permissive way: a bearer token wins server-side, and with
 *  none the query string stands. Same fallback as the rest of the estate. */
const params   = new URLSearchParams(location.search);
const customer = params.get('customer') || '10';

const $ = id => document.getElementById(id);
let open = null;      // symbol of the expanded row
let snap = null;      // last /api/portfolio payload
// The order result has to survive the refresh that follows it ┬Ę drawHoldings
// rebuilds the row's innerHTML, so a message written straight into the DOM is
// erased a moment after the user earns it.
let lastMsg = null;   // { symbol, html }

async function api(path, opts) {
  // A rejected fetch (server down, DNS, offline) used to throw out of here,
  // out of load(), and out of the bare call at the bottom of the file ┬Ę the
  // page then sat on its loading skeleton forever, shimmering, saying
  // nothing. A portfolio that looks like it is still loading is worse than
  // one that says it cannot load: the first is indistinguishable from a slow
  // network, so nobody refreshes and nobody reports it.
  let r;
  try {
    r = await fetch(path, opts);
  } catch (e) {
    return { error: 'cannot reach the broker service' };
  }
  const body = await r.json().catch(() => ({ error: 'bad response from ' + path }));
  if (!r.ok && !body.error) body.error = 'HTTP ' + r.status;
  return body;
}

// ------------------------------------------------------------------ header
function drawHeader(p) {
  const a = p.aggregate;
  const mv = fmtEur(a.marketValue);
  $('pv').innerHTML = mv !== null ? esc(mv)
    : NA(a.unpriced + ' holding(s) could not be priced, so the total is withheld rather than partly summed');

  const rows = [];
  // TODAY ┬Ę rendered only when the backend actually established it.
  if (a.dayChange !== null && a.dayChange !== undefined) {
    rows.push(row('Today', a.dayChange, null));
  } else if (a.holdings > 0) {
    rows.push(`<div class="pnl-row"><span>Today</span><div class="pnl-val">${
      NA(a.withoutPrevClose + ' holding(s) had no prior close, so the day total is withheld')}</div></div>`);
  }
  rows.push(row('Total unrealized', a.unrealized, a.unrealizedPct));
  rows.push(row('Realized', a.realized, null));
  $('pnl').innerHTML = rows.join('');

  function row(label, v, pct) {
    const s = fmtSignedEur(v);
    const p2 = fmtPct(pct);
    return `<div class="pnl-row"><span>${esc(label)}</span><div class="pnl-val ${signClass(v)}">${
      s === null ? NA('not established by the feed') : esc(s)
    }${p2 !== null ? `<span class="pct">${esc(p2)}</span>` : ''}</div></div>`;
  }
}

// ---------------------------------------------------------------- holdings
function drawHoldings(p) {
  const hs = sortHoldings(p.holdings || []);
  if (!hs.length) {
    $('thead').innerHTML = '';
    $('holdings').innerHTML = `<p class="muted" style="margin:0">No open positions.</p>`;
    return;
  }
  const withDay = anyDayData(hs);
  const cls = withDay ? '' : ' noday';
  $('thead').innerHTML = `<div class="thead${cls}"><span>Instrument</span><span>Value / Qty</span>${
    withDay ? `<span>Today</span>` : ''}</div>`;

  $('holdings').innerHTML = hs.map(h => {
    const isOpen = open === h.symbol;
    const value = fmtEur(h.value);
    const qty = fmtQty(h.qty);
    const day = fmtSignedEur(h.dayChange);
    const dayPct = fmtPct(h.dayChangePct);

    const dayCell = !withDay ? '' : `<div><div class="day ${signClass(h.dayChange)}">${
        day === null ? NA('the feed gave no prior close for this instrument') : esc(day)
      }</div>${dayPct !== null ? `<div class="sub ${signClass(h.dayChange)}">${esc(dayPct)}</div>`
        : (day !== null ? `<div class="sub" title="a position opened inside the day window has no starting value to be a percentage of">opened today</div>` : '')}</div>`;

    return `<div class="hrow${isOpen ? ' open' : ''}" data-sym="${esc(h.symbol)}">
      <div class="hgrid${cls}">
        <div>
          <div><span class="tkr">${esc(h.symbol)}</span>${
            h.exchange ? `<span class="exch">${esc(h.exchange)}</span>` : ''}${
            priceSuspect(h.priceSource) ? `<span class="flag">${esc(h.priceSource)}</span>` : ''}</div>
          <div class="cname">${esc(h.name || '')}</div>
        </div>
        <div>
          <div class="mv">${value === null ? NA('no live mark for this instrument') : esc(value)}</div>
          <div class="sub">${qty === null ? '' : esc(qty + unitFor(h.kind))}</div>
        </div>
        ${dayCell}
      </div>
      ${isOpen ? expansion(h) : ''}
    </div>`;
  }).join('');
}

function expansion(h) {
  const unreal = fmtSignedEur(h.unrealized), unrealPct = fmtPct(h.unrealizedPct);
  const cell = (label, html, klass) =>
    `<div><span>${esc(label)}</span><b class="${klass || ''}">${html}</b></div>`;

  // NO stopPropagation here ┬Ę the click handler is delegated on document, and
  // stopping the bubble would strand every control inside this panel. The
  // handler checks for .hx instead, which keeps clicks in here from
  // collapsing the row without also swallowing them.
  return `<div class="hx">
    <div class="dl">
      ${cell('Avg cost', fmtEur(h.avgCost) === null ? NA('no cost basis recorded') : esc(fmtEur(h.avgCost)))}
      ${cell('Last', fmtEur(h.price) === null ? NA('the feed did not return a mark') : esc(fmtEur(h.price)))}
      ${cell('Market value', fmtEur(h.value) === null ? NA('needs a live mark') : esc(fmtEur(h.value)))}
      ${cell('Cost basis', fmtEur(h.costBasis) === null ? NA('not recorded') : esc(fmtEur(h.costBasis)))}
      ${cell('Total P&L', (unreal === null ? NA('needs a live mark')
          : esc(unreal) + (unrealPct !== null ? ` <span class="pct">${esc(unrealPct)}</span>` : '')),
        signClass(h.unrealized))}
      ${cell('Realized', fmtSignedEur(h.realized) === null ? NA('not recorded') : esc(fmtSignedEur(h.realized)),
        signClass(h.realized))}
    </div>
    ${h.dayBasis ? `<div class="basis">Today measured against ${
      h.dayBasis === '24h' ? 'the price 24 hours ago' : 'the prior session close'
    }${h.priceSource ? ' ┬Ę mark from ' + esc(h.priceSource) : ''}</div>` : ''}

    <div class="amt-row">
      <label for="amt-${esc(h.symbol)}">Amount</label>
      <input id="amt-${esc(h.symbol)}" type="text" inputmode="decimal" value="50.00"
             aria-label="Order amount in euro">
    </div>
    <div class="acts">
      <button class="side-btn buy"  data-order="buy"  data-sym="${esc(h.symbol)}">BUY</button>
      <button class="side-btn sell" data-order="sell" data-sym="${esc(h.symbol)}">SELL</button>
    </div>
    <div class="msg" id="msg-${esc(h.symbol)}">${
      lastMsg && lastMsg.symbol === h.symbol ? lastMsg.html : ''}</div>
  </div>`;
}

// --------------------------------------------------------------- watchlist
function drawWatchlist(items) {
  // a failed request is not an empty watchlist ┬Ę saying "nothing here" when we
  // simply could not ask is the same class of lie as a fabricated zero
  if (items && items.error) {
    $('watchlist').innerHTML = `<p class="muted" style="margin:0">Could not load the watchlist: ${
      esc(items.error)}</p>`;
    return;
  }
  if (!Array.isArray(items) || !items.length) {
    $('watchlist').innerHTML = `<p class="muted" style="margin:0">Nothing on the watchlist.</p>`;
    return;
  }
  $('watchlist').innerHTML = items.map(w => `<div class="wrow">
      <span class="tkr">${esc(w.symbol)}</span>
      <span class="wpx">${markUnavailable(w.price)
        ? NA('this endpoint reports an unavailable mark as 0, so it is shown as unknown rather than as free')
        : esc(fmtEur(w.price))}</span>
    </div>`).join('');
}

// ------------------------------------------------------------------ notes
function drawNotes(p) {
  const a = p.aggregate, out = [];
  if (a.cashNote) out.push(a.cashNote);
  if (a.unpriced > 0)
    out.push(a.unpriced + ' holding(s) could not be priced. Totals that depend on a mark are withheld.');
  if (a.withoutPrevClose > 0)
    out.push(a.withoutPrevClose + ' holding(s) had no prior close, so the day total is withheld '
      + 'rather than partially summed.');
  out.push('Day window opens ' + p.dayStart + '. Equities move against the prior session close, crypto '
    + 'against 24 hours ago ┬Ę each row says which.');
  if (p.asOf) out.push('Priced at ' + p.asOf + '.');
  $('notes').innerHTML = out.map(t => `<p>${esc(t)}</p>`).join('');
}

// ------------------------------------------------------------------ wiring
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-order]');
  if (btn) { placeOrder(btn.dataset.sym, btn.dataset.order, btn); return; }
  // a click inside the open panel is aimed at the panel, not at collapsing it
  if (e.target.closest('.hx')) return;
  const row = e.target.closest('.hrow');
  if (row) {
    open = (open === row.dataset.sym) ? null : row.dataset.sym;
    lastMsg = null;
    if (snap) drawHoldings(snap);
  }
});

async function placeOrder(symbol, side, btn) {
  const input = $('amt-' + symbol);
  const msg = $('msg-' + symbol);
  const raw = (input && input.value || '').trim();
  const amount = Number(raw);
  if (!Number.isFinite(amount) || amount <= 0) {
    msg.innerHTML = `<span class="amount-neg">Enter an amount greater than zero.</span>`;
    return;
  }
  const buttons = btn.parentElement.querySelectorAll('button');
  buttons.forEach(b => b.disabled = true);
  msg.innerHTML = `<span class="muted">Placing ŌĆ”</span>`;

  // notional and qty are read server-side with Json.str ┬Ę they must be JSON
  // STRINGS. customer is read with Json.num and must be a bare number.
  const out = await api('/api/orders', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      clientOrderId: (crypto.randomUUID ? crypto.randomUUID()
                       : 'pf-' + Date.now() + '-' + Math.random().toString(16).slice(2)),
      customer: Number(customer),
      symbol: symbol,
      side: side,
      type: 'market',
      notional: amount.toFixed(2)
    })
  });
  buttons.forEach(b => b.disabled = false);

  if (out.error) {
    lastMsg = { symbol, html: `<span class="amount-neg">Ō£Ś ${esc(out.error)}</span>` };
  } else {
    const filled = out.result === 'filled';
    lastMsg = { symbol, html: `<span class="amount-pos">Ō£ō ${esc(side)} ${esc(symbol)} ┬Ę ${
      esc(out.result || 'sent')}${out.venue ? ' at ' + esc(out.venue) : ''}</span>${
      filled ? '' : `<span class="muted"> ┬Ę settlement is asynchronous, so the position `
        + `may take a moment to move</span>`}` };
  }
  msg.innerHTML = lastMsg.html;
  // Settlement is asynchronous (order ŌåÆ Kafka ŌåÆ ledger ŌåÆ back), so the
  // position may not have moved yet. Re-read rather than guess at the new one.
  load();
}

// ------------------------------------------------------------------- load
async function load(opts) {
  const p = await api('/api/portfolio?customer=' + encodeURIComponent(customer));
  if (p.error) {
    $('pv').innerHTML = NA('could not load');
    $('notes').innerHTML = `<p class="amount-neg">Could not load the portfolio: ${esc(p.error)}</p>`;
    // Clear the panels rather than leaving them. Two different lies live
    // here: on a FIRST load the skeletons shimmer forever and the page looks
    // busy; on a REFRESH the previous rows stay on screen, with their old
    // marks and day changes, under a header that now reads "not available".
    // Rows presented as current while the header admits it does not know are
    // the worse of the two.
    const gone = '<p class="muted">Not available ┬Ę the last figures have been cleared rather than shown as current.</p>';
    $('holdings').innerHTML = gone;
    $('watchlist').innerHTML = gone;
    return;
  }
  snap = p;
  drawHeader(p);
  drawHoldings(p);
  drawNotes(p);

  drawWatchlist(await api('/api/watchlist?customer=' + encodeURIComponent(customer)));
}

/** The banner must be TRUE, not merely present. The default venue is the
 *  simulation, and if this box is ever pointed at a real one the notice has
 *  to stop saying "simulated" and start saying the opposite, loudly. */
async function checkVenue() {
  const h = await api('/health');
  if (h && h.venue && h.venue !== 'simulated') {
    $('sim').classList.add('live');
    $('sim-title').textContent = 'Live venue ┬Ę ' + h.venue;
    $('sim-text').textContent = 'This broker is configured against a real venue (' + h.venue
      + '). Orders placed here are not a simulation.';
  }
}

load();
checkVenue();
</script>
