<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="/portfolio/icon.svg">
<link rel="apple-touch-icon" href="/portfolio/icon.svg">
<title>Portfolio · minibroker</title>
<style>
  /* ================================================================
     THE BANK'S STYLESHEET, NOT A SECOND ONE.
     Every rule below is copied verbatim from web/index.html. The two
     pages cannot share a file today (BrokerApi roots static at
     /web-broker, HttpApi at /web) so this is a copy · but a copy of
     the tokens is not a licence to drift from them. Nothing here is
     invented: no eleventh colour, no third font stack, no button size
     the bank does not have, no breakpoint outside its set.
     ================================================================ */
  :root { --bg:#0d1117; --panel:#161b22; --line:#21262d; --text:#e6edf3; --dim:#8b949e;
          --green:#3fb950; --red:#f85149; --amber:#d29922; --accent:#58a6ff; --violet:#bc8cff; }
  * { box-sizing:border-box; margin:0; scrollbar-width:thin; scrollbar-color:#2a3140 transparent; }
  *::-webkit-scrollbar { width:8px; height:8px; }
  *::-webkit-scrollbar-thumb { background:#2a3140; border-radius:999px; }
  *::-webkit-scrollbar-thumb:hover { background:#3a4356; }
  *::-webkit-scrollbar-track, *::-webkit-scrollbar-corner { background:transparent; }
  body { background:var(--bg); color:var(--text); font:14px/1.5 system-ui,'Segoe UI',sans-serif; }
  header { display:flex; align-items:center; gap:20px; padding:14px 22px; border-bottom:1px solid var(--line); }
  h1 { font-size:17px; font-weight:650; }
  h1 span { color:var(--accent); }
  nav { display:flex; gap:6px; margin-left:auto; }
  .tab-btn { background:none; border:1px solid var(--line); color:var(--dim); padding:6px 16px;
             border-radius:999px; font:600 13px system-ui; cursor:pointer; }
  .tab-btn.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  main { max-width:1100px; margin:0 auto; padding:22px; }
  .phone { max-width: 540px; margin: 0 auto; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:18px;
          overflow-x:auto; }
  .card h2 { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px; }
  .muted { color:var(--dim); font-size:12px; }
  .amount-pos { color:var(--green); } .amount-neg { color:var(--red); }
  .hidden { display:none !important; }

  .acct-card { background:radial-gradient(130% 150% at 0% 0%, rgba(188,140,255,.13), transparent 45%),
               radial-gradient(100% 130% at 100% 0%, rgba(88,166,255,.08), transparent 40%), var(--panel); }
  .acct-card, .tx-card { border-radius:18px; }
  .tx-card { margin-top:14px; }
  .acct-label { color:var(--dim); font-size:12px; font-weight:600; }
  .balance-num { font-size:46px; font-weight:750; margin:4px 0 10px; letter-spacing:-.5px; }

  /* THE HOLDINGS LIST · a flat sorted list of three columns, which is what
     Global Trader's portfolio screen is. Every rule below is the bank's,
     verbatim, and none of them is new to the estate:

       .stat        the bank's clickable list row · a hairline above, 5px of
                    padding, a hover wash and a pointer. It is the divider the
                    reference draws between holdings and the affordance that
                    says a row does something when you tap it.
       .tx-main     flex:1 with min-width:0 · used as nothing but a COLUMN.
                    Three of them in a .stat share the row in equal thirds
                    (flex:1 is flex-basis:0), so column two of one holding sits
                    directly above column two of the next. That is the whole
                    reason a table reads as a table.
       .tx-right    text-align:right, for the P&L column only.
       .tick-main   the bank's truncating cell · nowrap, overflow hidden, an
                    ellipsis. It goes on the two LINES that must not wrap (the
                    ticker and the company name), never on the column, because
                    white-space inherits and the quantity line has to be free
                    to wrap when it also carries a price disclosure.
       .sk-row      the bank's ROW skeleton, now that a holding is a row.

     What is gone with the tile grid: .tx-day and .txg-head (the asset-class
     band and its subtotal · Global Trader does not band this screen, it sorts
     it), and .prod.open / .prod-chev / .prod.expandable:hover, which existed
     to make a two-up grid of tiles expand in place. .prod itself stays: the
     Watchlist below is still a shelf of tiles and that is still the right
     picture of a shelf. */
  .prod-grid { display:grid; grid-template-columns:minmax(0,1fr) minmax(0,1fr); gap:10px; }
  .prod { min-width:0; position:relative; transition:border-color .15s, transform .15s; }
  .prod { border:1px solid var(--line); border-radius:14px; padding:11px 13px; }
  .prod-val, .prod-sub { overflow-wrap:break-word; }
  .stat { display:flex; justify-content:space-between; border-top:1px solid var(--line); padding:5px 0;
    font-size:12.5px; cursor:pointer; }
  .stat:hover { background:rgba(255,255,255,.03); }
  .tx-main { flex:1; min-width:0; }
  .tx-right { text-align:right; }
  .tick-main { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .prod-name { color:var(--dim); font-size:11.5px; font-weight:650; }
  .prod-val { font-size:16px; font-weight:700; margin:3px 0 1px; font-variant-numeric:tabular-nums; }
  .prod-sub { color:var(--dim); font-size:11px; min-height:14px; }
  .prod-btns { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .prod-x { margin-top:10px; border-top:1px solid var(--line); padding-top:10px; }
  .mini { background:none; border:1px solid var(--line); color:var(--text); padding:3px 10px;
          border-radius:7px; font:600 11px system-ui; cursor:pointer; }
  .mini:hover { border-color:var(--violet); color:var(--violet); }

  .sl-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .sl-row input[type=range] { flex:1; accent-color:var(--violet); min-width:0; }
  .sl-row b { font-variant-numeric:tabular-nums; min-width:56px; text-align:right; }
  .ph { margin-top:9px; }
  .ph-row { display:flex; justify-content:space-between; font-size:11px; color:var(--dim); padding:2px 0;
    border-top:1px solid rgba(255,255,255,.04); font-variant-numeric:tabular-nums; }
  .chip { font-size:10.5px; border:1px solid var(--line); border-radius:999px; padding:1.5px 8px; color:var(--dim); flex:none; }

  .sk { background:linear-gradient(90deg, #161c28 25%, #202939 37%, #161c28 63%);
    background-size:400% 100%; animation:skm 1.3s ease infinite; border-radius:7px; }
  @keyframes skm { 0% { background-position:100% 0; } 100% { background-position:0 0; } }
  .sk-tile { border:1px solid var(--line); border-radius:14px; padding:11px 13px; height:96px; }
  .sk-row { display:flex; align-items:center; gap:12px; padding:9px 4px; }

  /* the bank's footnote block · one hairline, one short line, never a stack
     of paragraphs under the fold */
  #guide-hint { color:var(--dim); font-size:11.5px; margin-top:10px; border-top:1px solid var(--line); padding-top:9px; }

  /* mobile: the same page, pocket-sized · the bank's own breakpoint and its
     own two changes, nothing extra */
  @media (max-width: 760px) {
    header { padding:10px 12px; gap:10px; }
    nav { overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
    nav::-webkit-scrollbar { display:none; }
    .tab-btn { padding:5px 12px; font-size:12px; white-space:nowrap; }
    main { padding:12px; }
    .balance-num { font-size:38px; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>
<!-- Estate bar: cross-app tabs + the one signed-in user, served by auth. -->
<script src="https://auth.b4rruf3t.com/eco-nav.js" defer></script>
<header>
  <!-- This is the broker, and it says so. It wore the bank's wordmark until
       2026-07-20, which read as the bank having two front doors rather than
       two services pointing at each other. -->
  <h1>mini<span>broker</span></h1>
  <nav>
    <button class="tab-btn on">Portfolio</button>
    <a class="tab-btn" id="bank-link" href="#" style="text-decoration:none">Bank</a>
  </nav>
</header>
<main>
  <div class="phone">

    <div class="card acct-card">
      <div class="acct-label" id="pv-label">Portfolio value · EUR</div>
      <div class="balance-num" id="pv"><span class="sk" style="display:inline-block;width:190px;height:44px;border-radius:12px;vertical-align:middle"></span></div>
      <div class="muted" id="day" style="margin:-4px 0 6px; font-size:13px"></div>
      <div class="ph" id="pnl"></div>
    </div>

    <div class="card tx-card">
      <h2>Holdings</h2>
      <!-- the skeleton is ROW-shaped because the holdings are · the same rule
           as before, pointing the other way now that a holding is a row in a
           sorted list and not a tile in a grid. A tile-shaped skeleton would
           settle into a flat list a moment later and the card would visibly
           change its mind about what it is. Same .sk-row the bank's own
           transaction list shimmers with. -->
      <div id="holdings">
        <div class="sk-row"><div class="sk" style="width:34%;height:30px"></div><div class="sk" style="width:30%;height:30px"></div><div class="sk" style="width:24%;height:30px;margin-left:auto"></div></div>
        <div class="sk-row"><div class="sk" style="width:34%;height:30px"></div><div class="sk" style="width:30%;height:30px"></div><div class="sk" style="width:24%;height:30px;margin-left:auto"></div></div>
        <div class="sk-row"><div class="sk" style="width:34%;height:30px"></div><div class="sk" style="width:30%;height:30px"></div><div class="sk" style="width:24%;height:30px;margin-left:auto"></div></div>
      </div>
    </div>

    <div class="card tx-card">
      <h2>Watchlist</h2>
      <div id="watchlist"><div class="prod-grid">
        <div class="sk-tile"><div class="sk" style="width:45%;height:11px"></div><div class="sk" style="width:60%;height:20px;margin:9px 0 7px"></div><div class="sk" style="width:80%;height:10px"></div></div>
        <div class="sk-tile"><div class="sk" style="width:45%;height:11px"></div><div class="sk" style="width:60%;height:20px;margin:9px 0 7px"></div><div class="sk" style="width:80%;height:10px"></div></div>
      </div></div>
      <div id="guide-hint"></div>
    </div>

  </div>
</main>

<script>
'use strict';
// ===================================================================== pure
// Everything above the fetch line is arithmetic and formatting only: no DOM,
// no network, no globals read. Kept here so it can be lifted into a test.

/** Money and quantities cross the wire as STRINGS (or bare null) on purpose ·
 *  the eighth decimal of a bitcoin position does not survive a double. */
const num = s => (s === null || s === undefined || s === '') ? null : Number(s);
const isNum = v => v !== null && v !== undefined && Number.isFinite(v);

/** en-US grouping on a EUR amount · the house convention, matched deliberately. */
function fmtEur(v, dp = 2) {
  const n = num(v);
  return !isNum(n) ? null
    : '€' + n.toLocaleString('en-US', { minimumFractionDigits: dp, maximumFractionDigits: dp });
}

/** U+2212 MINUS, never a hyphen · the bank's rule. */
function fmtSignedEur(v) {
  const n = num(v);
  if (!isNum(n)) return null;
  const body = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  // exactly flat carries no sign · '+€0.00' claims a gain that did not happen
  return (n === 0 ? '' : n < 0 ? '−' : '+') + '€' + body;
}

function fmtPct(v) {
  const n = num(v);
  if (!isNum(n)) return null;
  // Zero takes no sign, for the same reason fmtSignedEur refuses one: a real
  // loss whose percentage rounds to 0.00 must not render '+0.00%' in red.
  const sign = n < 0 ? '−' : n > 0 ? '+' : '';
  return sign + Math.abs(n).toFixed(2) + '%';
}

/** 'amount-pos' | 'amount-neg' | '' · zero is neither a gain nor a loss. */
function signClass(v) {
  const n = num(v);
  if (!isNum(n) || n === 0) return '';
  return n > 0 ? 'amount-pos' : 'amount-neg';
}

/** Quantity is formatted from the STRING the server sent, never via Number,
 *  so satoshi precision cannot be rounded away in transit. */
function fmtQty(qtyStr) {
  if (qtyStr === null || qtyStr === undefined) return null;
  const s = String(qtyStr);
  return s.includes('.') ? s.replace(/0+$/, '').replace(/\.$/, '') : s;
}

/** What a quantity is COUNTED IN, taken from the kind rather than assumed.
 *
 *  This read `kind === 'crypto' ? '' : ' sh'`, so every kind that was not
 *  crypto was announced as shares · and one contract is not one share, it is a
 *  claim on `multiplier` of them. An option position of 2 rendered "2 sh",
 *  understating what is held by a factor of 100 in the one place a reader looks
 *  to see how much they hold. The tile already knows better three rows down:
 *  the expansion draws a 'Contract size' cell for exactly this reason, and the
 *  Avg cost / Last labels are qualified per-contract off the same fact.
 *
 *  The bank page was checked for a convention to copy and has none · it renders
 *  quantities bare beside a label (ivHead) and never suffixes a unit, so there
 *  was nothing to inherit and this picks its own.
 *
 *  Spelled out rather than abbreviated: ' sh' is a unit a reader already knows,
 *  and no short form of contract is (`ctr` is not a word anyone reads). The
 *  sub-line comment above holdingTile is explicit that a tile is wider than the
 *  numeric column the old row gave this and the words fit here.
 *
 *  An unknown kind now says nothing instead of saying shares. A row arrives
 *  uncatalogued when the registry has no entry for the symbol · that is the
 *  case that has no multiplier either, and guessing 'shares' at it is the same
 *  invention this whole change removes, just quieter. */
function unitFor(kind, qty) {
  if (kind === 'crypto') return '';
  if (kind === 'equity') return ' sh';
  if (kind === 'option') return num(qty) === 1 ? ' contract' : ' contracts';
  return '';
}

/* The fixed largest-position-first sort that used to live here is gone. The
   list is sorted by whichever column the reader last tapped · see sortRows,
   which keeps the one rule this had that mattered: an unpriced holding sinks
   to the bottom rather than sorting as if it were worth nothing. */

/** A mark from /api/watchlist and /api/instruments, which fail SOFT TO ZERO
 *  (BrokerApi.mark) unlike /api/portfolio · so on those two a literal 0 means
 *  "no price", not "free".
 *  It reads a holding correctly too, and valueWhy/dayWhy use it for that: a
 *  zero mark is never valued on the portfolio side either, because
 *  Quote.priced() requires signum > 0, so the row arrives unpriced with a
 *  0.00 in `price` and "no mark" is the true thing to say about it. */
const markUnavailable = v => { const n = num(v); return !isNum(n) || n === 0; };

/** A price that is real but not current. PriceFeed serves the last good
 *  observation when the upstream is down and labels it 'cached'; that is a
 *  fact about a past moment, so the row keeps the number and simply stops
 *  presenting it as this second's. (There is no longer a 'fallback' source to
 *  handle here · the feed no longer invents a price to be handled.) */
const priceStale = src => src === 'cached';

// ===================================================================== view

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/** The bank has no dotted-underline affordance and no invented "N/A" shape.
 *  Its idiom for "we do not know" is plain dim text, so that is what this is. */
const NA = why => `<span class="muted" title="${esc(why)}">not available</span>`;

/** Identity, the permissive way. A bearer token wins server-side; with none
 *  the query string stands. What was missing was the token ever ARRIVING: this
 *  subdomain's localStorage starts empty, so until now the server only ever saw
 *  the ?customer= param, which is why any id in the URL was honoured.
 *
 *  ensureToken() below fixes that. The estate cookie (Domain=.b4rruf3t.com,
 *  HttpOnly) rides in on its own; one credentialed refresh trades it for an
 *  access token for THIS origin, and api() carries it. The server then reads
 *  the customer from the TOKEN and ignores the URL param, so a signed-in person
 *  sees THEIR book and no one else's, whatever they type in the address bar.
 *
 *  Nothing is required. No session means the refresh just fails and every
 *  request goes out exactly as before, on the param the four demo accounts are
 *  still explored through. A token only ever ADDS identity. */
const params   = new URLSearchParams(location.search);
let   customer = params.get('customer') || '10';

const AUTH_ORIGIN = location.hostname.startsWith('broker.')
  ? location.protocol + '//auth.' + location.hostname.slice('broker.'.length)
  : 'https://auth.b4rruf3t.com';       // local dev has no auth · refresh fails, param stands
let _tokenWait = null;
function _tokenFresh(t) {
  try {
    const exp = JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))).exp || 0;
    return exp * 1000 > Date.now() + 60000;      // a minute of slack, never send a token about to lapse
  } catch { return false; }
}
async function ensureToken() {
  const have = localStorage.getItem('b4rruf3t_token');
  if (have && _tokenFresh(have)) return have;
  // one refresh in flight at a time, so a page full of tiles firing at once
  // does not stampede the auth service with the same cookie
  if (!_tokenWait) _tokenWait = (async () => {
    try {
      const stored = localStorage.getItem('b4rruf3t_refresh');
      const r = await fetch(AUTH_ORIGIN + '/v1/tokens/refresh', {
        method: 'POST', credentials: 'include',       // the estate cookie · the whole point
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(stored ? { refresh_token: stored } : {}),
      });
      if (!r.ok) return null;
      const d = await r.json();
      if (d.access_token) localStorage.setItem('b4rruf3t_token', d.access_token);
      if (d.refresh_token) localStorage.setItem('b4rruf3t_refresh', d.refresh_token);
      return d.access_token || null;
    } catch { return null; } finally { _tokenWait = null; }
  })();
  return _tokenWait;
}

const $ = id => document.getElementById(id);
let open = null;      // symbol of the expanded tile
let snap = null;      // last /api/portfolio payload
let watch = null;     // last /api/watchlist payload
let catalog = null;   // /api/instruments, for the empty watchlist invitation
// The order result has to survive the refresh that follows it · draw()
// rebuilds the tile's innerHTML, so a message written straight into the DOM is
// erased a moment after the user earns it.
let lastMsg = null;   // { symbol, html }
const sliderVals = {};

/** THE BANK IS ON ITS OWN HOSTNAME · the mirror of index.html's brokerHref.
 *  Derived from the current host so dev and prod both work; local dev has no
 *  bank./broker. split, so it falls back to the ledger's own port. */
function bankHref() {
  const h = location.hostname;
  const base = h.startsWith('broker.')
    ? location.protocol + '//bank.' + h.slice('broker.'.length)
    : location.protocol + '//' + h + ':8080';
  return base + '/?customer=' + encodeURIComponent(customer);
}

async function api(path, opts) {
  // A rejected fetch (server down, DNS, offline) used to throw out of here and
  // leave the page shimmering on its skeleton forever, saying nothing. A page
  // that looks like it is still loading is worse than one that says it cannot
  // load: the first is indistinguishable from a slow network, so nobody
  // refreshes and nobody reports it.
  opts = opts || {};
  const token = await ensureToken();          // null when not signed in · then unchanged
  if (token) {
    const headers = new Headers(opts.headers || {});
    if (!headers.has('Authorization')) headers.set('Authorization', 'Bearer ' + token);
    opts = { ...opts, headers };
  }
  let r;
  try {
    r = await fetch(path, opts);
  } catch (e) {
    return { error: 'cannot reach the broker service' };
  }
  const body = await r.json().catch(() => ({ error: 'bad response from ' + path }));
  if (!r.ok && !body.error) body.error = 'HTTP ' + r.status;
  return body;
}

// ------------------------------------------------------------------ header
function drawHeader(p) {
  const a = p.aggregate;
  const mv = fmtEur(a.marketValue);
  // THE REASON HAS TO BE THE REASON.
  //
  // The backend withholds marketValue when unpriced, fabricated OR expired is
  // non-zero · three conditions, and this line used to name one of them and
  // print its count regardless. With a single expired contract and every feed
  // answering, the biggest number on the screen went missing and the tooltip
  // under it read "0 holding(s) have no live mark". The band tooltip a
  // hundred and forty lines below has always used unpriced + expired; the
  // headline, which is the one a customer actually reads, did not.
  //
  // Each clause is a different fact and they do not collapse into one:
  // unpriced means the feed did not answer, expired means the contract has
  // stopped existing and will never be marked again, fabricated means a
  // constant stood in for a price. Naming the wrong one is worse than naming
  // none, because it sends the reader to check a system that is fine.
  const why = [];
  if (Number(a.unpriced) > 0)    why.push(a.unpriced + ' with no live mark');
  if (Number(a.expired) > 0)     why.push(a.expired + ' expired');
  if (Number(a.fabricated) > 0)  why.push(a.fabricated + ' with no observed price');
  // ONE clause list, TWO figures. marketValue and unrealized are withheld by
  // the same Acc.whole() gate, so the same sentence is the true one for both ·
  // and the Unrealized row used to say 'needs a live mark' regardless, which
  // is the wrong system to name when the cause is an expired contract.
  const aggWhy = tail => why.length ? why.join(' · ') + ' holding(s), so ' + tail : tail;
  $('pv').innerHTML = mv !== null ? esc(mv)
    : NA(aggWhy('the total is withheld rather than partly summed'));

  // TODAY IS A LABELLED ROW NOW, not a sub-line · the reference's header puts
  // Today and Total on their own labelled rows beside the big figure, each
  // carrying BOTH the currency figure and the percent, and .ph-row is exactly
  // that two-column block. The sub-line under the balance is left for the one
  // thing that is a qualifier on the big figure rather than a figure of its
  // own: whether the marks it sums are current.
  //
  // "had no prior close" is the wrong sentence about an expired contract.
  // Its prior close is perfectly well known · what it does not have is a
  // CURRENT price to compare one against, because it has stopped existing.
  // Expired rows land in withoutPrevClose all the same (Portfolio.build
  // gates the day block on `valuable`), so the count is right and the
  // explanation was not.
  //
  // "position" and not "holding", deliberately: a position closed to flat
  // today also contributes here and has no row on the screen to point at,
  // so calling it a holding sends the reader hunting for a line that was
  // never drawn.
  const dayAggWhy = !(a.holdings > 0)
    ? 'nothing is held, so there is no day to measure'
    : Number(a.expired) > 0
      ? a.withoutPrevClose + ' position(s) could not be measured against a prior close · '
        + a.expired + ' of them because the contract has expired and has no current price to compare'
      : a.withoutPrevClose + ' position(s) had no prior close, so the day total is withheld'
        + ' rather than partly summed';

  // WHETHER THE BIGGEST NUMBER ON THE PAGE IS CURRENT.
  //
  // `stale` counts marks served from the last known price because the
  // upstream is down. Those are real observations with an old timestamp, so
  // they legitimately sum into a total · but the total then describes a
  // moment that has passed, and until now it rendered identically to a live
  // one. The rows already badge themselves '· last known price' and the
  // backend has shipped this count all along for exactly this purpose; the
  // 46px balance figure above them said nothing. A qualifier that only ever
  // appears on the row and never on the sum is a disclosure the headline
  // reader never sees.
  const staleHtml = a.stale > 0
    ? `<span class="muted" title="${esc('the upstream feed is unreachable, so ' + a.stale
        + ' of ' + a.holdings + ' holding(s) are marked at the last price actually observed')
      }">${a.stale === a.holdings ? 'at last known prices'
                                  : 'includes ' + a.stale + ' last known price(s)'}</span>`
    : '';
  $('day').innerHTML = staleHtml;

  // THE REFERENCE CALLS THE SECOND ROW "Total". THIS ONE DOES NOT, and the
  // difference is not carelessness. Global Trader's Total is total P&L on open
  // positions, which is this page's UNREALISED · but this page also shows
  // REALISED directly beneath it, and a reader who adds a row labelled "Total"
  // to the row under it is doing arithmetic the label already claimed to have
  // done. The reference has no realised row to collide with. So the layout is
  // the reference's · a labelled row carrying the figure and its percent · and
  // the label is the one that is true here.
  const rows = [];
  rows.push(row('Today', a.dayChange, a.dayChangePct, dayAggWhy));
  rows.push(row('Unrealized', a.unrealized, a.unrealizedPct,
                aggWhy('this figure is withheld rather than partly summed')));
  // realized is stored, not marked · no feed can take it away, so there is no
  // feed to blame if it ever arrives missing
  rows.push(row('Realized', a.realized, null, 'no realized P&L was recorded'));
  $('pnl').innerHTML = rows.join('');

  function row(label, v, pct, rowWhy) {
    const s = fmtSignedEur(v), p2 = fmtPct(pct);
    return `<div class="ph-row"><span>${esc(label)}</span><b class="${signClass(v)}">${
      s === null ? NA(rowWhy) : esc(s)
    }${p2 !== null ? ' · ' + esc(p2) : ''}</b></div>`;
  }
}

// ---------------------------------------------------------------- holdings
/** The bank's amount picker · a slider inside the tile, not a text field.
 *  Same generator, same markup, same €-formatted readout. */
window.slideVal = (k, v) => {
  sliderVals[k] = Number(v);
  const o = document.querySelector('#sl-' + cssKey(k) + '-out');
  if (o) o.textContent = '€' + Number(v).toLocaleString('en-US');
};
const cssKey = k => String(k).replace(/[^A-Za-z0-9_-]/g, '_');
function slider(k, min, max, step, dflt) {
  const v = sliderVals[k] ?? (sliderVals[k] = dflt);
  return `<div class="sl-row"><input type="range" min="${min}" max="${max}" step="${step}" value="${v}"
    oninput="slideVal('${esc(k)}', this.value)" aria-label="Order amount in euro"><b id="sl-${cssKey(k)}-out">€${
    Number(v).toLocaleString('en-US')}</b></div>`;
}

/**
 * ONE LABELLED FIGURE PAIR · the shape the whole screen is built from.
 *
 * A label, and hard against the right edge the money it names, sign-coloured,
 * with its percentage trailing it when there honestly is one. This is the
 * bank's .ph-row · the same element drawHeader() uses for Today, Unrealized
 * and Realized on the header card above. It repeats at header and at detail,
 * which is the entire visual hierarchy: there is no second idea to learn
 * further down the page.
 *
 * A missing percentage is a deliberate state and not a gap to fill. A position
 * opened today has a real day change and NO honest percentage, so nothing
 * trails the figure rather than '0.00%', which would be a specific claim that
 * it did not move made about something that moved.
 */
/* WHERE THE TWO P&Ls LIVE NOW. Today's is on the ROW, in both units, because
 * the reference gives it a column of its own and it is the figure a portfolio
 * screen is read for. Unrealised is one tap down, in both units, because the
 * reference has a detail screen and because there is no third column to put it
 * in · a 390px row is three columns wide and the third is spoken for.
 *
 * This is not the tile's old bargain re-made. The tile carried both P&Ls in
 * euro on its face and handed both percentages to the tap, to keep them
 * symmetrical; the list keeps them asymmetrical on purpose, because the
 * columns are labelled and a reader can see that the column says Today. What
 * must not come back is the version where the day is the ONLY P&L the screen
 * admits to · a position can be up on the year and down on the morning · and
 * it has not: Unrealized is on the header card in both units for the whole
 * portfolio, and on every row's detail in both units for that position. */
/* THE REASON IS AN ARGUMENT, NOT A CONSTANT · the same rule drawHeader's own
 * comment block states, enforced here by making it impossible to omit.
 *
 * This function used to answer 'needs a live mark' for every withheld figure
 * it drew, at every call site. That sentence is true of exactly one of the
 * conditions the backend withholds under. A position whose feed answered with
 * a price but no prior close (Portfolio.java:410) has a live mark, is valued
 * live in the .prod-val directly above, shows a live 'Last' in its expansion,
 * and its Day still read "not available · needs a live mark" · sending the
 * reader to check a feed that is working. So the caller, which is the only
 * thing that knows WHICH figure it is asking for and why the backend might
 * have withheld it, supplies the reason. */
function pnlRow(label, eur, pct, why) {
  const s = fmtSignedEur(eur), p = fmtPct(pct);
  return `<div class="ph-row"><span>${esc(label)}</span><b class="${signClass(eur)}">${
    s === null ? NA(why) : esc(s) + (p === null ? '' : ' · ' + esc(p))
  }</b></div>`;
}

/**
 * WHY THIS HOLDING HAS NO VALUE · read off the row itself, in the order
 * Portfolio.build decides it, so the sentence names the condition that
 * actually fired rather than the most common one.
 *
 * value is null when isExpired, or the contract size is unknown, or the quote
 * was not observed (no mark at all, or a fabricated constant). Each is a
 * different fact about a different system and they do not collapse into one.
 */
function valueWhy(h) {
  if (h.priceSource === 'expired')
    return 'this contract has expired · it is still held and it is not valued, so no figure is claimed';
  if (markUnavailable(h.price))
    return 'the feed returned no mark for this instrument';
  if (h.priceSource === 'fallback')
    return 'no price for this instrument was ever observed · a stand-in constant is not a mark';
  if (num(h.multiplier) === null)
    return 'this instrument is not in the catalog, so its contract size · and with it its value · is unknown';
  return 'this figure is withheld rather than partly computed';
}

/**
 * WHY THIS HOLDING HAS NO DAY CHANGE · the same read, one condition longer.
 *
 * The day block is gated on `q.observed() && q.prevClose() != null && valuable`
 * (Portfolio.java:410), so everything that kills the value kills the day too,
 * AND a missing prior close kills the day on its own while the value stands.
 * That last case is the one the single hardcoded reason got wrong.
 */
function dayWhy(h) {
  if (h.priceSource === 'expired')
    return 'this contract has expired · there is no current price to measure against its prior close';
  if (markUnavailable(h.price))
    return 'the feed returned no mark for this instrument, so today\'s move cannot be measured';
  if (h.priceSource === 'fallback')
    return 'no price for this instrument was ever observed · a stand-in constant cannot measure a day';
  if (num(h.multiplier) === null)
    return 'this instrument is not in the catalog, so its contract size · and with it its day move · is unknown';
  if (num(h.prevClose) === null)
    return 'the feed returned a price but no prior close · there is nothing to measure today\'s move against, '
         + 'and the mark above is live';
  return 'today\'s move is withheld rather than partly computed';
}

/**
 * SORTING · pure functions over the holdings array, so the whole of it is
 * testable without a browser. A comparator key per column and a direction,
 * the same doctrine as web/lib.js.
 *
 * Three rules, and each one is a defect that a naive sort ships:
 *
 *   NULLS LAST IN BOTH DIRECTIONS. An unpriced holding has no market value.
 *   Sorted as a number it becomes 0 and floats to the top of an ascending
 *   sort as the cheapest thing you own, which is the screen version of the
 *   fabricated zero this page refuses everywhere else. It is not the
 *   cheapest, it is unknown, and unknown belongs at the bottom whichever way
 *   the arrow points.
 *
 *   STABLE. Equal values keep the order the server sent, so tapping a column
 *   twice returns you to where you were and two holdings that are genuinely
 *   level do not swap places on every redraw. Engine sort is specified stable
 *   in modern JS, but the tie-break is written out rather than assumed,
 *   because it is also what keeps ties in CATALOGUE order under a DESCENDING
 *   sort · negating the comparator would otherwise reverse them too.
 *
 *   PRESENTATION ONLY. sortBy sets two variables and redraws from the last
 *   snapshot. It does not refetch · a sort is not new information · and it
 *   does not touch `open`, so the row you have expanded stays expanded
 *   underneath you while the list reorders around it.
 */
const SORT_KEYS = {
  instrument: h => (h.symbol === null || h.symbol === undefined || h.symbol === '')
                     ? null : String(h.symbol),
  value:      h => num(h.value),
  day:        h => num(h.dayChange),
};

/** null, undefined and a non-finite number are all THE SAME FACT here: this
 *  holding has no figure in this column. None of them is a quantity. */
const sortMissing = k => k === null || k === undefined
                      || (typeof k === 'number' && !Number.isFinite(k));

function sortRows(hs, col, dir) {
  const key = SORT_KEYS[col] || SORT_KEYS.instrument;
  const desc = dir === 'desc';
  return hs
    .map((h, i) => ({ h, i, k: key(h) }))
    .sort((a, b) => {
      const am = sortMissing(a.k), bm = sortMissing(b.k);
      // the direction is deliberately NOT applied to this branch
      if (am || bm) return (am && bm) ? a.i - b.i : (am ? 1 : -1);
      const c = typeof a.k === 'string'
        ? a.k.localeCompare(b.k)
        : (a.k < b.k ? -1 : a.k > b.k ? 1 : 0);
      return c === 0 ? a.i - b.i : (desc ? -c : c);
    })
    .map(d => d.h);
}

let sortCol = 'instrument';   // the reference's default
let sortDir = 'asc';

/** A column already sorted toggles; a new column starts ascending. Both are
 *  one redraw and no request. */
window.sortBy = col => {
  if (!SORT_KEYS[col]) return;
  if (sortCol === col) sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  redraw();
};

function drawHoldings(p) {
  const hs = p.holdings || [];
  $('holdings').className = '';
  if (!hs.length) {
    // An empty portfolio is a state, not a fault and not an apology. One
    // short line · the thing to do next is the Watchlist card directly below,
    // which is an affordance and does not need a paragraph pointing at it.
    $('holdings').innerHTML = `<div class="muted" style="font-size:13px">Nothing invested yet.</div>`;
    return;
  }

  // ONE FLAT SORTED LIST, and the asset-class bands are gone with the grid.
  //
  // The bands were honest and they were still wrong here. Global Trader does
  // not group this screen by instrument type, it sorts it · and a customer
  // holding one stock and one crypto got two grids of one tile each, every
  // tile alone in the left column with the right half of the row empty and a
  // subtotal floating half a card away from the single figure it totalled.
  // A subtotal of one is not a subtotal. The counts those bands carried
  // (unpriced, expired, fabricated) are still disclosed, on the header where
  // the figure they qualify actually is, and per row where the cause is.
  //
  // The shipped grouping is deliberately not read any more. Nothing on this
  // screen needs it, the backend still computes it correctly for whatever
  // screen next does, and leaving the read in here would invite the bands back
  // one field at a time.
  $('holdings').innerHTML = headerRow() + sortRows(hs, sortCol, sortDir).map(holdingRow).join('');
}

/**
 * THE HEADER ROW · three labels, and the arrow that says which one is doing
 * the work.
 *
 * The arrow is not decoration. A sorted list with no indication of what it is
 * sorted by is a list you have to sort yourself to trust, and the reference
 * carries it for exactly that reason. It sits only on the active column,
 * because an arrow on all three says nothing.
 *
 * .stat is the bank's clickable list row and supplies the pointer, the hover
 * wash and the hairline; .prod-name is its dim 11.5px label. Nothing here is
 * a new shape.
 */
function headerRow() {
  const cell = (col, label, right) =>
    `<div class="tx-main${right ? ' tx-right' : ''}" onclick="sortBy('${esc(col)}')">
       <span class="prod-name">${esc(label)}${
         sortCol === col ? (sortDir === 'asc' ? ' ▲' : ' ▼') : ''}</span>
     </div>`;
  return `<div class="stat">
      ${cell('instrument', 'Instrument')}
      ${cell('value', 'Value/Shares')}
      ${cell('day', 'Today’s P&L', true)}
    </div>`;
}

/**
 * THE ROW · three columns, two lines each, which is the reference exactly.
 *
 *   Instrument     TICKER, then the exchange small and dim
 *                  the company name, dim, elided when it is too long
 *   Value/Shares   the market value
 *                  the quantity held, and any disclosure about the price it
 *                  was marked at
 *   Today's P&L    today's move in euro
 *                  today's move as a percent
 *
 * WHY THE COLUMN IS .tx-main AND THE LINE IS .tick-main. Both are the bank's
 * and they are not interchangeable. .tx-main is flex:1 with min-width:0 and
 * nothing else, so three of them split the row into equal thirds (flex:1 is
 * flex-basis:0, so the split does not depend on the content) and column two of
 * one holding lands directly above column two of the next. .tick-main adds
 * nowrap, overflow:hidden and an ellipsis · which is what the company name
 * needs and what the quantity line must NOT have, because white-space
 * inherits, and a disclosure that elides is a disclosure that vanishes. So the
 * truncation goes on the two lines that want it and never on the column.
 *
 * BOTH P&L LINES CARRY THE SIGN AND THE COLOUR, and both of them get it from a
 * span rather than from the line's own class. .prod-sub sets a dim colour and
 * is declared after .amount-pos in this stylesheet exactly as it is in the
 * bank's, so `class="prod-sub amount-pos"` renders DIM: the gain would lose its
 * green and say nothing. A nested span has only the one colour rule on it.
 *
 * A missing percentage is a deliberate state and not a gap to fill. A position
 * opened today has a real day change and no honest denominator for it, so the
 * second line is empty rather than '0.00%', which would be a specific claim
 * that it did not move made about something that moved. .prod-sub's
 * min-height keeps the row's height the same either way.
 */
function holdingRow(h) {
  const isOpen = open === h.symbol;
  const value = fmtEur(h.value);
  const qty = fmtQty(h.qty);
  const day = fmtSignedEur(h.dayChange), dayPct = fmtPct(h.dayChangePct);
  const sc = signClass(h.dayChange);

  // What the row says when it cannot say a price · beside the quantity, which
  // is the line the value above it is a value OF, rather than in prose under
  // the fold.
  const note = h.priceSource === 'expired' ? 'expired'
             : priceStale(h.priceSource) ? 'last known price'
             : num(h.price) === null ? 'no live price'
             : null;
  // The table keeps the OTHER side's unit semantics · unitFor(kind, qty), so
  // an option says 'contracts' rather than 'sh' and an uncatalogued row says
  // nothing rather than guessing shares. It gets the RAW h.qty because it
  // counts to decide singular against plural, and fmtQty's output is a
  // display string. The company name is NOT here: in this layout it lives on
  // the Instrument column's second line, per the Global Trader reference.
  const shares = [qty === null ? null : qty + unitFor(h.kind, h.qty), note]
                   .filter(Boolean).map(esc).join(' · ');

  const row = `<div class="stat" onclick="rowOpen('${esc(h.symbol)}')">
      <div class="tx-main">
        <div class="prod-val tick-main">${esc(h.symbol)}${
          h.exchange ? ` <span class="muted">${esc(h.exchange)}</span>` : ''}</div>
        <div class="prod-sub tick-main">${h.name ? esc(h.name) : ''}</div>
      </div>
      <div class="tx-main">
        <div class="prod-val">${value === null ? NA(valueWhy(h)) : esc(value)}</div>
        <div class="prod-sub">${shares}</div>
      </div>
      <div class="tx-main tx-right">
        <div class="prod-val">${day === null ? NA(dayWhy(h))
          : `<span class="${sc}">${esc(day)}</span>`}</div>
        <div class="prod-sub">${dayPct === null ? ''
          : `<span class="${sc}">${esc(dayPct)}</span>`}</div>
      </div>
    </div>`;

  // THE DETAIL, where the reference puts it · a separate block under the row
  // rather than a fourth column, because unrealised P&L in two units, an
  // average cost, a last price, a cost basis and an order ticket do not fit
  // beside a market value on a 390px phone and never did.
  return row + (isOpen
    ? `<div class="prod-x" onclick="event.stopPropagation()">${expansion(h)}</div>`
    : '');
}

function expansion(h) {
  const k = h.symbol;
  const cell = (label, html, klass) =>
    `<div class="ph-row"><span>${esc(label)}</span><b class="${klass || ''}">${html}</b></div>`;
  const owned = isNum(num(h.qty)) && num(h.qty) > 0;
  // A contract controls a hundred shares, so value is not qty * price and a
  // reader who checks the arithmetic deserves to be told why rather than to
  // conclude the page is wrong. 1 is the ordinary case and says nothing.
  const mult = num(h.multiplier);

  // UNREALIZED IN BOTH UNITS, and it is the reason to open a row rather than a
  // duplication of one. The row carries Today, in both units, in its own
  // labelled column; there is no fourth column for the position's whole P&L,
  // so this is where it is · with its percentage, because a percentage is
  // exactly the sort of figure a detail screen is for. Today is NOT restated
  // here: the row above is still on screen and still says it.
  // What is otherwise here is the stuff a row has no room for at all: what it
  // cost, what it is marked at, and what has already been banked.
  // THE TWO FIGURES ARE NOT IN THE SAME UNIT, AND THE LABELS NOW SAY SO.
  //
  // avgCost is costBasis/qty and costBasis carries the multiplier · it was
  // accumulated from Broker.consideration, which applied the contract size at
  // fill time. So for an option this is euros per CONTRACT. h.price is the raw
  // premium, quoted per SHARE of the underlying. Rendered as two adjacent
  // unlabelled euro figures they read as a collapse: one contract bought at a
  // premium of 5.00 with a multiplier of 100 showed "Avg cost €500.00"
  // directly over "Last €5.00" · a 99% fall on a position that is exactly
  // flat, contradicting the €0.00 unrealised on the row above it, and the
  // correct number was the one in the smaller type. The contract-size cell
  // that explains it sat three rows lower and did not say which figure it
  // applied to.
  //
  // 1 is the ordinary case and gets the ordinary labels: a share's cost and a
  // share's price ARE in the same unit, and qualifying them would be noise.
  const perContract = isNum(mult) && mult !== 1;

  return `<div class="ph">
      ${pnlRow('Unrealized', h.unrealized, h.unrealizedPct, valueWhy(h))}
      ${cell(perContract ? 'Avg cost / contract' : 'Avg cost',
        fmtEur(h.avgCost) === null ? NA('no cost basis recorded') : esc(fmtEur(h.avgCost)))}
      ${cell(perContract ? 'Last · premium per share' : 'Last', fmtEur(h.price) === null
          ? NA(h.priceSource === 'expired'
                ? 'this contract has expired · its last premium is not a current price'
                : 'the feed did not return a mark')
          : esc(fmtEur(h.price)))}
      ${perContract ? cell('Contract size', esc(fmtQty(h.multiplier)) + ' × underlying') : ''}
      ${cell('Cost basis', fmtEur(h.costBasis) === null ? NA('not recorded') : esc(fmtEur(h.costBasis)))}
      ${cell('Realized', fmtSignedEur(h.realized) === null ? NA('not recorded') : esc(fmtSignedEur(h.realized)),
        signClass(h.realized))}
      ${h.expiresOn ? cell('Expires', esc(h.expiresOn)) : ''}
      ${cell('Day measured over', h.dayBasis === '24h' ? 'the last 24 hours' : 'the prior session')}
    </div>
    ${slider(k, 10, 250, 5, 50)}
    <div class="prod-btns">
      <button class="mini" onclick="placeOrder('${esc(k)}','buy')">buy</button>
      ${owned ? `<button class="mini" onclick="placeOrder('${esc(k)}','sell')">sell</button>
      <button class="mini" onclick="sellAll('${esc(k)}','${esc(h.qty)}')">sell all</button>` : ''}
    </div>
    <div class="prod-sub" style="margin-top:6px" id="msg-${cssKey(k)}">${
      lastMsg && lastMsg.symbol === k ? lastMsg.html : ''}</div>`;
}

window.rowOpen = k => { open = (open === k) ? null : k; lastMsg = null; redraw(); };

// --------------------------------------------------------------- watchlist
function drawWatchlist() {
  const el = $('watchlist');

  // a failed request is not an empty watchlist · saying "nothing here" when we
  // simply could not ask is the same class of lie as a fabricated zero
  if (watch && watch.error) {
    el.innerHTML = `<div class="muted">Could not load the watchlist: ${esc(watch.error)}</div>`;
    return;
  }
  const items = Array.isArray(watch) ? watch : [];
  const heldSyms = new Set((snap && snap.holdings || []).map(h => h.symbol));

  if (!items.length) {
    // AN EMPTY WATCHLIST INVITES. The old page reported "Nothing on the
    // watchlist." · true, useless, and a dead end. The catalog is right there,
    // so offer it: every instrument the broker can actually route, one tap to
    // follow. If the catalog itself has not arrived we say that instead of
    // pretending the shelf is bare.
    if (!Array.isArray(catalog)) {
      el.innerHTML = `<div class="muted">Loading instruments …</div>`;
      return;
    }
    const offer = catalog.filter(i => !heldSyms.has(i.symbol)).slice(0, 4);
    if (!offer.length) {
      el.innerHTML = `<div class="muted">You already hold everything on the shelf.</div>`;
      return;
    }
    el.innerHTML = `<div class="muted" style="margin-bottom:10px">Follow something to keep an eye on its price.</div>
      <div class="prod-grid">${offer.map(i => `<div class="prod">
        <div class="prod-name">${esc(i.symbol)}${i.name ? ' · ' + esc(i.name) : ''}</div>
        <div class="prod-val">${markUnavailable(i.price) ? NA('no live mark right now') : esc(fmtEur(i.price))}</div>
        <!-- the shelf offers these for purchase, so the same rule applies:
             a stale mark beside a buy button is the one place a customer acts
             on the number rather than merely reads it -->
        <div class="prod-sub">${[i.exchange || i.kind || '',
            priceStale(i.priceSource) ? 'last known price' : ''].filter(Boolean).map(esc).join(' · ')}</div>
        <div class="prod-btns"><button class="mini" onclick="watchAdd('${esc(i.symbol)}')">＋ follow</button></div>
      </div>`).join('')}</div>`;
    return;
  }

  // WATCHABLE AND TRADABLE ARE DIFFERENT PREDICATES, and the row says which
  // one it is. The broker answers `tradable` per symbol from the catalog, so
  // a followed index shows the chip instead of a buy button that would come
  // straight back as "not a listed instrument". Offering the button and
  // explaining the failure afterwards is the same discipline problem as
  // pricing something at zero: the screen knew, and said it too late.
  el.innerHTML = `<div class="prod-grid">${items.map(w => `<div class="prod">
      <div class="prod-name">${esc(w.symbol)}${w.name ? ' · ' + esc(w.name) : ''}</div>
      <div class="prod-val">${markUnavailable(w.price)
        ? NA('no live mark right now · this is not a price of zero')
        : esc(fmtEur(w.price))}</div>
      <!-- THE SAME DISCLOSURE THE HOLDINGS ROWS MAKE, on the same screen,
           about the same feed. A 'cached' mark is the last price actually
           observed, served because the upstream is unreachable, and PriceFeed
           puts NO age bound on it · if Yahoo stays down for days the same
           figure keeps coming back. A holdings row badges that '· last known
           price' and the 46px total is qualified too; these tiles printed a
           plain €199.90 and looked live, because the endpoint discarded the
           source before the page could see it. It ships priceSource now. -->
      ${priceStale(w.priceSource)
        ? `<div class="prod-sub" title="${esc('the upstream feed is unreachable · this is the last price actually observed, and it has no age bound')}">last known price</div>`
        : ''}
      <div class="prod-sub" id="msg-${cssKey(w.symbol)}">${
        lastMsg && lastMsg.symbol === w.symbol ? lastMsg.html : ''}</div>
      <div class="prod-btns">
        ${w.tradable === false
          ? `<span class="chip" title="followed here · not listed for trading">watch only</span>`
          : `<button class="mini" onclick="placeOrder('${esc(w.symbol)}','buy',true)">buy €50</button>`}
        <button class="mini" onclick="watchRemove('${esc(w.symbol)}')">unfollow</button>
      </div>
    </div>`).join('')}</div>`;
}

window.watchAdd = async sym => {
  await api('/api/watchlist', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ customer: Number(customer), symbol: sym, action: 'add' }) });
  await load();
};
window.watchRemove = async sym => {
  await api('/api/watchlist', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ customer: Number(customer), symbol: sym, action: 'remove' }) });
  await load();
};

// ------------------------------------------------------------------ orders

/** CLOSING A POSITION IS A QUANTITY ORDER, NOT A EUR ONE · and it has to be.
 *  Selling "€50 of" a €50 position asks the venue to derive units from a
 *  price that has moved since the buy, so it computes fractionally MORE than
 *  is held and the broker refuses the whole thing ("cannot sell 0.00088516:
 *  position is 0.00088427"). The exact holding is a number we already have,
 *  so sending it beats re-deriving it and being wrong in the eighth decimal. */
window.sellAll = (symbol, qty) => placeOrder(symbol, 'sell', null, qty);

window.placeOrder = async (symbol, side, fixed, qty) => {
  const amount = fixed ? 50 : Number(sliderVals[symbol] ?? 50);
  const msgEl = $('msg-' + cssKey(symbol));
  if (msgEl) msgEl.innerHTML = `<span class="muted">Placing …</span>`;

  // qty and notional are read server-side with Json.str · they must be JSON
  // STRINGS. customer is read with Json.num and must be a bare number.
  const order = {
    clientOrderId: (crypto.randomUUID ? crypto.randomUUID()
                     : 'pf-' + Date.now() + '-' + Math.random().toString(16).slice(2)),
    customer: Number(customer),
    symbol: symbol,
    side: side,
    type: 'market'
  };
  if (qty) order.qty = String(qty); else order.notional = amount.toFixed(2);

  const out = await api('/api/orders', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(order)
  });

  if (out.error) {
    lastMsg = { symbol, html: `<span class="amount-neg">${esc(out.error)}</span>` };
  } else {
    // WHAT THIS CAN HONESTLY CLAIM. The order is placed and the venue may
    // already have filled it, but the money moves when the fill settles into
    // the ledger, a Kafka round trip later. So it says the order went through
    // and that the balance follows · never "bought", which would be a promise
    // about a commit that has not happened.
    lastMsg = { symbol, html: `<span class="amount-pos">${esc(side)} ${esc(symbol)} · order placed</span>
      <span class="muted">· your balance updates when it settles</span>` };
  }
  if (msgEl) msgEl.innerHTML = lastMsg.html;
  // Settlement is asynchronous (order → Kafka → ledger → back), so the
  // position may not have moved yet. Re-read rather than guess at the new one,
  // twice: once now, once after the round trip has had time to land.
  await load();
  setTimeout(load, 1200);
};

// -------------------------------------------------------------------- load
function redraw() {
  if (!snap) return;
  drawHeader(snap);
  drawHoldings(snap);
  drawWatchlist();
}

async function load() {
  const p = await api('/api/portfolio?customer=' + encodeURIComponent(customer));
  if (p.error) {
    $('pv').innerHTML = NA('could not load');
    $('day').innerHTML = '';
    $('pnl').innerHTML = '';
    // Clear the panels rather than leaving them. Two different lies live here:
    // on a FIRST load the skeletons shimmer forever and the page looks busy;
    // on a REFRESH the previous tiles stay on screen with their old marks,
    // under a header that now reads "not available". Rows presented as current
    // while the header admits it does not know are the worse of the two.
    const gone = `<div class="muted">Not available · the last figures have been cleared rather than shown as current.</div>`;
    $('holdings').className = '';
    $('holdings').innerHTML = gone;
    $('watchlist').innerHTML = gone;
    $('guide-hint').innerHTML = `<span class="amount-neg">${esc(p.error)}</span>`;
    return;
  }
  snap = p;
  // The server just told us who it actually served · the token's customer when
  // a token was sent, the param's otherwise. Adopt it, so every following call
  // and the back-link to the bank speak the SAME identity the books belong to,
  // even if the address bar said something else.
  if (p.customer != null) customer = String(p.customer);
  watch = await api('/api/watchlist?customer=' + encodeURIComponent(customer));
  if (catalog === null) {
    const c = await api('/api/instruments');
    catalog = Array.isArray(c) ? c : [];
  }
  redraw();

  // NO FOOTNOTE. The last line of prose that lived here said cash is in the
  // bank account and this page values securities only · which is what the
  // header label already says, in two words, at the top, where the number it
  // qualifies actually is. A sentence under the fold restating a label above
  // it is read by nobody and is the first thing to go stale. #guide-hint
  // stays in the markup because load() writes errors into it, and an error
  // is the one thing down here worth a sentence.
  $('guide-hint').textContent = '';
}

$('bank-link').href = bankHref();
load();
</script>
