# OBSERVABILITY · Prometheus scrapes every app pod's /metrics via Kubernetes
# service discovery; Grafana graphs it. Both run IN the cluster, provisioned
# from ConfigMaps · no click-ops, the dashboard is version-controlled JSON.
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: prometheus }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata: { name: prometheus }
rules:
  - apiGroups: [""]
    resources: [pods, endpoints, services, nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata: { name: prometheus }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: prometheus }
subjects:
  - { kind: ServiceAccount, name: prometheus, namespace: default }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: prometheus-config }
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      # discover every minibank app pod and scrape it individually, so each
      # pod's counters stay coherent (scraping the Service would round-robin)
      - job_name: minibank
        kubernetes_sd_configs: [{ role: pod }]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: minibank
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            action: keep
            regex: "8080"
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      # The OTHER services · fx on 8090, broker on 8091.
      #
      # These were invisible until now, and the reason is worth keeping: the
      # job above keeps pods whose label is exactly "minibank" AND whose
      # container port is exactly 8080, so every sibling service failed both
      # halves of the rule and silently never appeared. A monitoring config
      # that silently drops a target is worse than one that noisily fails,
      # because the graph still looks fine.
      #
      # Opt-in by annotation instead: a service says it wants scraping and on
      # which port, and adding the next service needs no change here at all.
      - job_name: minibank-services
        kubernetes_sd_configs: [{ role: pod }]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: "([^:]+)(?::\\d+)?;(\\d+)"
            replacement: "$1:$2"
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels: { app: prometheus }
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=2h
          ports: [{ containerPort: 9090 }]
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 400Mi }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus }
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090 }]
---
apiVersion: v1
kind: ConfigMap
metadata: { name: grafana-provisioning }
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: minibank
        folder: minibank
        type: file
        options: { path: /var/lib/grafana/dashboards }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: grafana-dashboard }
data:
  minibank.json: |
    {
      "uid": "minibank", "title": "minibank · live", "schemaVersion": 39,
      "time": { "from": "now-15m", "to": "now" }, "refresh": "5s", "editable": true,
      "panels": [
        { "id": 1, "type": "stat", "title": "Request rate (req/s)", "gridPos": {"h":6,"w":6,"x":0,"y":0},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum(rate(minibank_http_requests_total[1m]))","refId":"A"}] },
        { "id": 2, "type": "stat", "title": "p99 latency (s)", "gridPos": {"h":6,"w":6,"x":6,"y":0},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"histogram_quantile(0.99, sum(rate(minibank_http_request_duration_seconds_bucket[5m])) by (le))","refId":"A"}] },
        { "id": 3, "type": "stat", "title": "Redis hit rate", "gridPos": {"h":6,"w":6,"x":12,"y":0},
          "fieldConfig": {"defaults":{"unit":"percentunit"}},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum(rate(minibank_cache_total{result=\"hit\"}[5m])) / clamp_min(sum(rate(minibank_cache_total[5m])), 1)","refId":"A"}] },
        { "id": 4, "type": "stat", "title": "Money in flight (EUR)", "gridPos": {"h":6,"w":6,"x":18,"y":0},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum(minibank_inflight_eur)","refId":"A"}] },
        { "id": 5, "type": "timeseries", "title": "HTTP requests by route", "gridPos": {"h":9,"w":12,"x":0,"y":6},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum(rate(minibank_http_requests_total[1m])) by (route)","legendFormat":"{{route}}","refId":"A"}] },
        { "id": 6, "type": "timeseries", "title": "Ledger events by kind", "gridPos": {"h":9,"w":12,"x":12,"y":6},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum(rate(minibank_ledger_events_total[5m])) by (kind)","legendFormat":"{{kind}}","refId":"A"}] },
        { "id": 7, "type": "timeseries", "title": "Outbox backlog by region", "gridPos": {"h":8,"w":12,"x":0,"y":15},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"minibank_outbox_pending","legendFormat":"{{region}}","refId":"A"}] },
        { "id": 8, "type": "timeseries", "title": "Connection pool busy by region", "gridPos": {"h":8,"w":12,"x":12,"y":15},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"minibank_pool_busy","legendFormat":"{{region}}","refId":"A"}] }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  labels: { app: grafana }
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          ports: [{ containerPort: 3000 }]
          env:
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: "Admin" }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: "admin" }
            - { name: GF_USERS_DEFAULT_THEME, value: "dark" }
          volumeMounts:
            - { name: provisioning-ds, mountPath: /etc/grafana/provisioning/datasources }
            - { name: provisioning-db, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { memory: 300Mi }
      volumes:
        - name: provisioning-ds
          configMap: { name: grafana-provisioning, items: [{ key: datasource.yaml, path: datasource.yaml }] }
        - name: provisioning-db
          configMap: { name: grafana-provisioning, items: [{ key: dashboards.yaml, path: dashboards.yaml }] }
        - name: dashboards
          configMap: { name: grafana-dashboard, items: [{ key: minibank.json, path: minibank.json }] }
---
apiVersion: v1
kind: Service
metadata: { name: grafana }
spec:
  selector: { app: grafana }
  ports: [{ port: 3000 }]
