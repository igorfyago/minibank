services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: minibank
      POSTGRES_USER: minibank
      POSTGRES_DB: minibank
    ports:
      - "5433:5432"   # 5433 on the host: 5432 is taken by another project
    volumes:
      - pgdata:/var/lib/postgresql/data

  # STAGE 5 — sharding. Two MORE Postgres servers, deliberately separate
  # containers: a shard is a different MACHINE. You cannot JOIN across them,
  # and that impossibility is the whole lesson.
  shard0:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: minibank
      POSTGRES_USER: minibank
      POSTGRES_DB: minibank
    ports:
      - "5434:5432"
    volumes:
      - shard0data:/var/lib/postgresql/data

  shard1:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: minibank
      POSTGRES_USER: minibank
      POSTGRES_DB: minibank
    ports:
      - "5435:5432"
    volumes:
      - shard1data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: postgres
      DB_USER: minibank
      DB_PASSWORD: minibank
      DB_NAME: minibank
      POOL_MODE: transaction
      MAX_CLIENT_CONN: '1000'
      DEFAULT_POOL_SIZE: '10'
      AUTH_TYPE: scram-sha-256
    ports:
      - "6432:5432"
    depends_on:
      - postgres

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

volumes:
  pgdata:
  shard0data:
  shard1data:
